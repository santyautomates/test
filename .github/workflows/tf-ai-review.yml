name: GCP Terraform AI Reviewer

on:
  pull_request:
    paths:
      - '**/*.tf'

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write 
      contents: read
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js (For MCP Server)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install ADK Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-adk

      - name: Fetch PR Diff and Run AI Gatekeeper
        id: run_agent
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Fetch the exact code changes for this specific PR
          gh pr diff ${{ github.event.pull_request.number }} > pr_diff.txt
          
          # 2. Run the AI. If the AI outputs [REJECTED], this step will exit with code 1 and fail.
          python ai_reviewer.py > ai_review.md
          
      - name: Post or Update AI Review Comment
        # CRITICAL: This ensures the comment posts even if the previous step fails!
        if: always() 
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: terraform-ai-review # This ID tracks the comment so it edits instead of duplicates
          path: ai_review.md
