name: GCP Terraform AI Reviewer

on:
  pull_request:
    paths:
      - '**/*.tf'

jobs:
  ai-review:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js (For MCP Server)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade google-adk
          pip install --upgrade google-generativeai
          pip install ghapi

      - name: Fetch PR Diff and Run AI Gatekeeper
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch PR diff
          gh pr diff ${{ github.event.pull_request.number }} > pr_diff.txt

          # Run AI reviewer (always create output file)
          python ai_reviewer.py > ai_review.md || echo "## ⚠️ AI crashed" > ai_review.md

      - name: Post or Update AI Review Comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: terraform-ai-review
          path: ai_review.md
