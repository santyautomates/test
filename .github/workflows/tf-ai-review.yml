name: GCP Terraform AI Reviewer

on:
  pull_request:
    paths:
      - '**/*.tf' # Only run if Terraform files are changed

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Required to post comments on the PR
      contents: read
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js (For MCP Server)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install ADK Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-adk

      - name: Run ADK PR Reviewer
        id: run_agent
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PR_CONTEXT: "The user has opened a pull request modifying Terraform files. Please suggest 3 GCP security improvements they should check for."
        run: |
          # Run the script and save the output to a file
          python ai_reviewer.py > ai_review.md
          
      - name: Post AI Review as PR Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use the GitHub CLI to post the Markdown file as a comment
          gh pr comment ${{ github.event.pull_request.number }} --body-file ai_review.md
